<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Web Development</title>

    <!-- Internal CSS -->
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
        }

        h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: white;
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #f1f1f1;
            transform: scale(1.05);
        }

        footer {
            margin-top: 60px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Welcome to Web Development 🚀</h1>
        <p>
            Web development is the foundation of building websites and web applications.
            Learn HTML, CSS, and JavaScript to create beautiful and interactive web experiences.
        </p>
        <a href="#" class="btn">Get Started</a>
    </header>

    <footer>
        © 2026 Web Development Journey | Designed with ❤️
    </footer>

</body>
</html>
